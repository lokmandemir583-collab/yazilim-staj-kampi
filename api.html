<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Çalışması</title>
  <link rel="stylesheet" href="api.css">
</head>
<body>

  <div class="container">
    <h1>API Çalışması</h1>

    <p>
      Bu sayfada JavaScript ile internetten veri çekmeyi ve API’ye veri göndermeyi öğreneceğim.
    </p>

    <button id="veriGetirBtn">Kullanıcıları Getir</button>

    <input id="aramaInput" type="text" placeholder="Kullanıcı adı, email veya şehir ara">

    <p id="durumMesaji"></p>

    <div class="post-form-alani">
      <h2>Yeni Gönderi Oluştur</h2>

      <input id="userIdInput" type="number" placeholder="Kullanıcı ID">

      <input id="postBaslikInput" type="text" placeholder="Gönderi başlığı">

      <textarea id="postMetinInput" placeholder="Gönderi metni"></textarea>

      <button id="postGonderBtn">Gönderiyi API’ye Gönder</button>

      <p id="postSonucMesaji"></p>
    </div>

    <div id="kullaniciListesi"></div>
  </div>

  <script src="api.js"></script>
</body>
</html>
